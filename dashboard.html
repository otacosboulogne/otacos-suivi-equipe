<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O'TACOS — Dashboard Équipier du Mois</title>
  <style>
    :root{--bg:#0f1115;--card:#171a21;--text:#f5f7fb;--muted:#a9b0bd;--gold:#f6b319;--gold-2:#ffd36a;--line:#2b3140;--shadow:0 16px 40px rgba(0,0,0,.28)}
    *{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#0c0f14 0%, #12161f 100%);color:var(--text)}.wrap{max-width:1280px;margin:0 auto;padding:24px}
    .hero,.card{background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:24px;box-shadow:var(--shadow)}.hero{padding:24px;margin-bottom:20px;background:radial-gradient(circle at top right, rgba(246,179,25,.15), transparent 28%),linear-gradient(135deg, rgba(246,179,25,.12), rgba(255,255,255,.03))}
    .card{padding:20px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:20px}.stat{padding:18px;border-radius:18px;background:#1f2430;border:1px solid rgba(255,255,255,.05)}
    .k{font-size:13px;color:var(--muted)} .v{font-size:30px;font-weight:900;margin-top:8px}.main{display:grid;grid-template-columns:1.1fr .9fr;gap:20px}table{width:100%;border-collapse:collapse}th,td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:left}th{color:#dbe3f1;font-size:13px}
    .badge{display:inline-block;padding:8px 12px;border-radius:999px;background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#111;font-weight:900}.bar{height:10px;background:#10151d;border:1px solid rgba(255,255,255,.08);border-radius:999px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-2))}
    select,a.btn{padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:#10151d;color:var(--text);text-decoration:none}.empty{color:var(--muted)}@media(max-width:980px){.grid,.main{grid-template-columns:1fr}.wrap{padding:14px}}
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero"><div class="top"><div><h1 style="margin:0 0 8px 0">Dashboard Équipier du mois</h1><div style="color:var(--muted)">O'TACOS BOULOGNE SUR MER</div></div><div style="display:flex;gap:10px;flex-wrap:wrap"><select id="monthSelect"></select><a class="btn" href="./index.html">Retour saisie</a></div></div></section>
    <div class="grid"><div class="stat"><div class="k">Gagnant</div><div class="v" id="winnerName">—</div></div><div class="stat"><div class="k">Score gagnant</div><div class="v" id="winnerScore">0</div></div><div class="stat"><div class="k">Services évalués</div><div class="v" id="servicesCount">0</div></div><div class="stat"><div class="k">Équipiers évalués</div><div class="v" id="staffCount">0</div></div></div>
    <div class="main"><section class="card"><div class="top" style="margin-bottom:10px"><div style="font-size:20px;font-weight:800">Classement du mois</div><div class="badge" id="selectedMonthLabel">—</div></div><table><thead><tr><th>Rang</th><th>Équipier</th><th>Score moyen</th><th>Services</th><th>Tendance</th></tr></thead><tbody id="rankingBody"></tbody></table></section><section class="card"><div style="font-size:20px;font-weight:800;margin-bottom:12px">Détail du gagnant</div><div id="winnerCard" class="empty">Charge un mois pour voir les résultats.</div></section></div>
  </div>
  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyHcDOxq9rUP1lEY24KGR9lZ4Z713sllK3kVaQDs_LaUulI-IZWwmNPoU8wD6XL6TAV/exec";
    function monthOptions(n=12){const arr=[];const now=new Date();for(let i=0;i<n;i++){const d=new Date(now.getFullYear(), now.getMonth()-i, 1);const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');arr.push(`${y}-${m}`)}return arr}
    function initMonths(){const sel=document.getElementById('monthSelect');monthOptions().forEach(m=>{const opt=document.createElement('option');opt.value=m;opt.textContent=m;sel.appendChild(opt)});sel.value=monthOptions(1)[0];sel.addEventListener('change',loadDashboard)}
    async function loadDashboard(){const month=document.getElementById('monthSelect').value;document.getElementById('selectedMonthLabel').textContent=month;if(!APPS_SCRIPT_URL||APPS_SCRIPT_URL.includes("PASTE_YOUR")){renderEmpty("Configure APPS_SCRIPT_URL dans dashboard.html.");return}try{const url=APPS_SCRIPT_URL+(APPS_SCRIPT_URL.includes('?') ? '&':'?')+`mode=dashboard&month=${encodeURIComponent(month)}`;const res=await fetch(url);const data=await res.json();if(data.ok===false) throw new Error(data.error||"Impossible de charger le dashboard.");renderDashboard(data, month)}catch(err){renderEmpty(err.message)}}
    function renderEmpty(message){document.getElementById('winnerName').textContent='—';document.getElementById('winnerScore').textContent='0';document.getElementById('servicesCount').textContent='0';document.getElementById('staffCount').textContent='0';document.getElementById('rankingBody').innerHTML=`<tr><td colspan="5" class="empty">${message}</td></tr>`;document.getElementById('winnerCard').innerHTML=`<div class="empty">${message}</div>`}
    function renderDashboard(data, month){const ranking=data.ranking||[];const winner=ranking[0];document.getElementById('winnerName').textContent=winner ? winner.staff : '—';document.getElementById('winnerScore').textContent=winner ? winner.avgScore : '0';document.getElementById('servicesCount').textContent=String(data.totalServiceRows||0);document.getElementById('staffCount').textContent=String(ranking.length);const body=document.getElementById('rankingBody');if(!ranking.length){body.innerHTML=`<tr><td colspan="5" class="empty">Aucune donnée pour ${month}.</td></tr>`;document.getElementById('winnerCard').innerHTML=`<div class="empty">Aucune donnée pour ${month}.</div>`;return}body.innerHTML=ranking.map((r,idx)=>`<tr><td>${idx+1}</td><td>${escapeHtml(r.staff)}</td><td><b>${r.avgScore}</b></td><td>${r.services}</td><td><div class="bar"><div class="fill" style="width:${r.avgScore}%"></div></div></td></tr>`).join("");document.getElementById('winnerCard').innerHTML=`<div style="font-size:30px;font-weight:900;margin-bottom:8px">${escapeHtml(winner.staff)}</div><div style="color:#a9b0bd;margin-bottom:16px">${month}</div><div style="display:grid;gap:12px">${metric("Score moyen", winner.avgScore)}${metric("Services évalués", winner.services)}${metric("Productivité", winner.avgProductivity)}${metric("Qualité", winner.avgQuality)}${metric("Ponctualité", winner.avgPunctuality)}${metric("Polyvalence", winner.avgVersatility)}${metric("Esprit d’équipe", winner.avgTeamwork)}${metric("Satisfaction client", winner.avgCustomer)}${metric("Pertes / casse", winner.avgLosses)}</div>`}
    function metric(label, value){return `<div><div style="font-size:13px;color:#a9b0bd">${label}</div><div style="font-size:22px;font-weight:800">${value}</div></div>`}
    function escapeHtml(str){return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
    initMonths();loadDashboard();
  </script>
</body>
</html>
