<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O'TACOS — Dashboard Équipier du Mois</title>
  <style>
    :root{
      --bg:#0f1115;--card:#171a21;--text:#f5f7fb;--muted:#a9b0bd;
      --gold:#f6b319;--gold-2:#ffd36a;--line:#2b3140;
      --shadow:0 16px 40px rgba(0,0,0,.28)
    }
    *{box-sizing:border-box}
    body{
      margin:0;font-family:Inter,Arial,sans-serif;
      background:linear-gradient(180deg,#0c0f14 0%, #12161f 100%);
      color:var(--text)
    }
    .wrap{max-width:1280px;margin:0 auto;padding:24px}
    .hero,.card{
      background:var(--card);
      border:1px solid rgba(255,255,255,.06);
      border-radius:24px;
      box-shadow:var(--shadow)
    }
    .hero{
      padding:24px;margin-bottom:20px;
      background:
        radial-gradient(circle at top right, rgba(246,179,25,.15), transparent 28%),
        linear-gradient(135deg, rgba(246,179,25,.12), rgba(255,255,255,.03))
    }
    .card{padding:20px}
    .top{
      display:flex;justify-content:space-between;align-items:center;
      gap:12px;flex-wrap:wrap
    }
    .grid{
      display:grid;grid-template-columns:repeat(4,minmax(0,1fr));
      gap:16px;margin-bottom:20px
    }
    .stat{
      padding:18px;border-radius:18px;background:#1f2430;
      border:1px solid rgba(255,255,255,.05)
    }
    .k{font-size:13px;color:var(--muted)}
    .v{font-size:30px;font-weight:900;margin-top:8px}
    .main{display:grid;grid-template-columns:1.1fr .9fr;gap:20px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:12px 10px;border-bottom:1px solid var(--line);text-align:left}
    th{color:#dbe3f1;font-size:13px}
    .badge{
      display:inline-block;padding:8px 12px;border-radius:999px;
      background:linear-gradient(135deg,var(--gold),var(--gold-2));
      color:#111;font-weight:900
    }
    .bar{
      height:10px;background:#10151d;border:1px solid rgba(255,255,255,.08);
      border-radius:999px;overflow:hidden
    }
    .fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-2))}
    select{
      padding:12px 14px;border-radius:14px;border:1px solid rgba(255,255,255,.08);
      background:#10151d;color:var(--text)
    }
    .empty{color:var(--muted)}
    .err{
      margin-top:12px;padding:12px 14px;border-radius:14px;
      background:#2a1111;border:1px solid #6a2323;color:#ffd3d3;
      white-space:pre-wrap
    }
    .entry{
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:16px;
      margin-bottom:14px;
      background:#1b202a
    }
    .service-box{
      padding:12px;border-radius:14px;background:#10151d;
      border:1px solid rgba(255,255,255,.06)
    }
    .service-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:8px
    }
    @media(max-width:980px){
      .grid,.main,.service-grid{grid-template-columns:1fr}
      .wrap{padding:14px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="top">
        <div>
          <h1 style="margin:0 0 8px 0">Dashboard Équipier du mois</h1>
          <div style="color:var(--muted)">O'TACOS BOULOGNE SUR MER</div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <select id="monthSelect"></select>
        </div>
      </div>
    </section>

    <div class="grid">
      <div class="stat"><div class="k">Gagnant</div><div class="v" id="winnerName">—</div></div>
      <div class="stat"><div class="k">Score gagnant</div><div class="v" id="winnerScore">0</div></div>
      <div class="stat"><div class="k">Services évalués</div><div class="v" id="servicesCount">0</div></div>
      <div class="stat"><div class="k">Équipiers évalués</div><div class="v" id="staffCount">0</div></div>
    </div>

    <div class="main">
      <section class="card">
        <div class="top" style="margin-bottom:10px">
          <div style="font-size:20px;font-weight:800">Classement du mois</div>
          <div class="badge" id="selectedMonthLabel">—</div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Rang</th>
              <th>Équipier</th>
              <th>Score moyen</th>
              <th>Services</th>
              <th>Tendance</th>
            </tr>
          </thead>
          <tbody id="rankingBody"></tbody>
        </table>
        <div id="errorBox"></div>
      </section>

      <section class="card">
        <div style="font-size:20px;font-weight:800;margin-bottom:12px">Détail du gagnant</div>
        <div id="winnerCard" class="empty">Charge un mois pour voir les résultats.</div>
      </section>
    </div>

    <section class="card" style="margin-top:20px">
      <div style="font-size:20px;font-weight:800;margin-bottom:12px">Dernière saisie par équipier</div>
      <div id="latestEntries"></div>
    </section>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxRVPh9ZBhggLjNWhWR8R92XhTR-CuPBi7HpggCXpwqF4ga_QBT0lyClkarEseKpr-B/exec";

    async function initMonths(){
      const sel = document.getElementById('monthSelect');
      sel.innerHTML = '';

      try{
        const url = `${APPS_SCRIPT_URL}?mode=months`;
        const res = await fetch(url);
        const data = await res.json();

        const months = (data.months || []).sort().reverse();

        if(!months.length){
          const now = new Date();
          const fallback = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
          addMonthOption(sel, fallback);
          sel.value = fallback;
        }else{
          months.forEach(m => addMonthOption(sel, m));
          sel.value = months[0];
        }

        sel.addEventListener('change', loadDashboard);
        loadDashboard();
      }catch(err){
        const now = new Date();
        const fallback = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
        addMonthOption(sel, fallback);
        sel.value = fallback;
        sel.addEventListener('change', loadDashboard);
        loadDashboard();
      }
    }

    function addMonthOption(select, value){
      const opt = document.createElement('option');
      opt.value = value;
      opt.textContent = value;
      select.appendChild(opt);
    }

    async function loadDashboard(){
      const month = document.getElementById('monthSelect').value;
      document.getElementById('selectedMonthLabel').textContent = month;
      document.getElementById('errorBox').innerHTML = '';

      try{
        const url = `${APPS_SCRIPT_URL}?mode=dashboard&month=${encodeURIComponent(month)}`;
        const res = await fetch(url);
        const text = await res.text();

        let data;
        try{
          data = JSON.parse(text);
        }catch{
          throw new Error('Réponse backend invalide');
        }

        if(data.ok === false){
          throw new Error(data.error || 'Erreur backend');
        }

        renderDashboard(data, month);
      }catch(err){
        renderEmpty(err.message);
        document.getElementById('errorBox').innerHTML =
          `<div class="err">${escapeHtml(err.message)}</div>`;
      }
    }

    function renderEmpty(message){
      document.getElementById('winnerName').textContent='—';
      document.getElementById('winnerScore').textContent='0';
      document.getElementById('servicesCount').textContent='0';
      document.getElementById('staffCount').textContent='0';
      document.getElementById('rankingBody').innerHTML=`<tr><td colspan="5" class="empty">${escapeHtml(message)}</td></tr>`;
      document.getElementById('winnerCard').innerHTML=`<div class="empty">${escapeHtml(message)}</div>`;
      document.getElementById('latestEntries').innerHTML=`<div class="empty">${escapeHtml(message)}</div>`;
    }

    function renderDashboard(data, month){
      const ranking = data.ranking || [];
      const winner = ranking[0];

      document.getElementById('winnerName').textContent = winner ? winner.staff : '—';
      document.getElementById('winnerScore').textContent = winner ? winner.avgScore : '0';
      document.getElementById('servicesCount').textContent = String(data.totalServiceRows || 0);
      document.getElementById('staffCount').textContent = String(ranking.length);

      const body = document.getElementById('rankingBody');

      if(!ranking.length){
        body.innerHTML=`<tr><td colspan="5" class="empty">Aucune donnée pour ${escapeHtml(month)}.</td></tr>`;
        document.getElementById('winnerCard').innerHTML=`<div class="empty">Aucune donnée pour ${escapeHtml(month)}.</div>`;
      }else{
        body.innerHTML = ranking.map((r,idx)=>`
          <tr>
            <td>${idx+1}</td>
            <td>${escapeHtml(r.staff)}</td>
            <td><b>${r.avgScore}</b></td>
            <td>${r.services}</td>
            <td><div class="bar"><div class="fill" style="width:${Math.max(0, Math.min(100, Number(r.avgScore)||0))}%"></div></div></td>
          </tr>
        `).join("");

        document.getElementById('winnerCard').innerHTML = `
          <div style="font-size:30px;font-weight:900;margin-bottom:8px">${escapeHtml(winner.staff)}</div>
          <div style="color:#a9b0bd;margin-bottom:16px">${escapeHtml(month)}</div>
          <div style="display:grid;gap:12px">
            ${metric("Score moyen", winner.avgScore)}
            ${metric("Services évalués", winner.services)}
            ${metric("Productivité", winner.avgProductivity)}
            ${metric("Qualité", winner.avgQuality)}
            ${metric("Ponctualité", winner.avgPunctuality)}
            ${metric("Polyvalence", winner.avgVersatility)}
            ${metric("Esprit d’équipe", winner.avgTeamwork)}
            ${metric("Satisfaction client", winner.avgCustomer)}
            ${metric("Pertes / casse", winner.avgLosses)}
          </div>
        `;
      }

      renderLatestEntries(data.latestDailyEntries || []);
    }

    function renderLatestEntries(entries){
      const box = document.getElementById('latestEntries');
      if(!box) return;

      if(!entries.length){
        box.innerHTML = `<div class="empty">Aucune dernière saisie disponible.</div>`;
        return;
      }

      box.innerHTML = entries.map(entry => {
        const matin = entry.services?.Matin;
        const soir = entry.services?.Soir;

        return `
          <div class="entry">
            <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:10px">
              <div>
                <div style="font-size:20px;font-weight:800">${escapeHtml(entry.staff)}</div>
                <div style="color:#a9b0bd">Date : ${escapeHtml(entry.date)} • Responsable : ${escapeHtml(entry.manager || '—')}</div>
              </div>
            </div>

            <div style="display:grid;gap:12px">
              ${matin ? serviceBlock('Matin', matin) : ''}
              ${soir ? serviceBlock('Soir', soir) : ''}
            </div>
          </div>
        `;
      }).join('');
    }

    function serviceBlock(label, s){
      return `
        <div class="service-box">
          <div style="font-weight:800;margin-bottom:8px">${escapeHtml(label)} — Score ${escapeHtml(String(s.score))}</div>
          <div class="service-grid">
            <div><span style="color:#a9b0bd">Prod.</span><br>${escapeHtml(String(s.productivity))}</div>
            <div><span style="color:#a9b0bd">Qualité</span><br>${escapeHtml(String(s.quality))}</div>
            <div><span style="color:#a9b0bd">Ponctualité</span><br>${escapeHtml(String(s.punctuality))}</div>
            <div><span style="color:#a9b0bd">Polyvalence</span><br>${escapeHtml(String(s.versatility))}</div>
            <div><span style="color:#a9b0bd">Équipe</span><br>${escapeHtml(String(s.teamwork))}</div>
            <div><span style="color:#a9b0bd">Client</span><br>${escapeHtml(String(s.customer))}</div>
            <div><span style="color:#a9b0bd">Pertes</span><br>${escapeHtml(String(s.losses))}</div>
          </div>
          ${s.comment ? `<div style="margin-top:10px;color:#d7dbe3"><span style="color:#a9b0bd">Commentaire :</span> ${escapeHtml(s.comment)}</div>` : ''}
        </div>
      `;
    }

    function metric(label, value){
      return `<div><div style="font-size:13px;color:#a9b0bd">${escapeHtml(label)}</div><div style="font-size:22px;font-weight:800">${escapeHtml(String(value))}</div></div>`;
    }

    function escapeHtml(str){
      return String(str)
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    initMonths();
  </script>
</body>
</html>
