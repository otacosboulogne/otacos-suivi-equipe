<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Production - O'Tacos</title>
  
  <!-- Chargement des bibliothèques via CDN ultra-fiables -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>

  <style>
    :root { --orange: #f08a00; --blue: #185fa5; --bg: #fdfaf7; --card: #ffffff; --line: #e2d8ce; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #1a1c1e; margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: 0 auto; }
    .header { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--line); margin-bottom: 20px; text-align: center; }
    .filter-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--line); margin-bottom: 20px; display: flex; justify-content: center; align-items: center; gap: 15px; }
    .chart-box { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid var(--line); box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; height: 400px; }
    select { padding: 10px; border-radius: 8px; border: 1px solid var(--line); font-size: 16px; width: 250px; cursor: pointer; }
    h1 { color: var(--blue); margin: 0; font-size: 24px; }
    h2 { color: var(--orange); font-size: 18px; margin-top: 0; }
    .error-msg { color: red; background: #ffe6e6; padding: 10px; border-radius: 8px; display: none; margin-bottom: 20px; text-align: center; }
  </style>
</head>
<body>

<div class="container">
  <div id="errorMessage" class="error-msg"></div>

  <div class="header">
    <h1>Analytics Production - Suivi Technique</h1>
  </div>

  <div class="filter-card">
    <label style="font-weight: bold;">Équipier :</label>
    <select id="staffSelect" onchange="updateDashboard()">
      <option value="">Chargement des données...</option>
    </select>
  </div>

  <div class="chart-box">
    <h2>⭐ Évolution du Score (/10)</h2>
    <canvas id="chartScore"></canvas>
  </div>

  <div class="chart-box">
    <h2>📊 Volume de tests</h2>
    <canvas id="chartBar"></canvas>
  </div>
</div>

<script>
  // CONFIGURATION
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxOeeL3oBcLkhZQEUvIwVMBrL62Y9N5zvNkjb_eoyGRabEX3Ht4I3VjrGGlmpDGErTN/exec"; 
  
  let rawData = [];
  let chartInstance1 = null;
  let chartInstance2 = null;

  // Lancement automatique
  window.onload = init;

  async function init() {
    const errorDiv = document.getElementById('errorMessage');
    const select = document.getElementById('staffSelect');

    try {
      console.log("Connexion à l'API...");
      const response = await fetch(`${APPS_SCRIPT_URL}?mode=getProduction`);
      
      if (!response.ok) throw new Error("Le serveur Google ne répond pas.");
      
      const json = await response.json();
      console.log("JSON reçu :", json);

      if (json.ok && json.production && json.production.length > 0) {
        rawData = json.production;
        
        // Extraire les noms uniques
        const noms = [...new Set(rawData.map(d => d.staff))].filter(n => n).sort();
        
        // Remplir le select
        select.innerHTML = '<option value="all">Tous les équipiers</option>';
        noms.forEach(n => {
          const opt = document.createElement('option');
          opt.value = n;
          opt.textContent = n;
          select.appendChild(opt);
        });

        updateDashboard();
      } else {
        throw new Error("Aucune donnée trouvée dans la feuille 'Production'.");
      }

    } catch (e) {
      console.error(e);
      errorDiv.style.display = 'block';
      errorDiv.textContent = "⚠️ Erreur : " + e.message;
      select.innerHTML = '<option value="">Erreur de chargement</option>';
    }
  }

  function updateDashboard() {
    const val = document.getElementById('staffSelect').value;
    if (!val) return;

    const data = (val === 'all') ? rawData : rawData.filter(d => d.staff === val);
    
    // Tri par date
    data.sort((a, b) => new Date(a.date) - new Date(b.date));

    renderLineChart(data);
    renderBarChart(data);
  }

  function renderLineChart(data) {
    const ctx = document.getElementById('chartScore').getContext('2d');
    if (chartInstance1) chartInstance1.destroy();

    chartInstance1 = new Chart(ctx, {
      type: 'line',
      data: {
        labels: data.map(d => d.date),
        datasets: [{
          label: 'Note Performance',
          data: data.map(d => d.note),
          borderColor: '#f08a00',
          backgroundColor: 'rgba(240, 138, 0, 0.1)',
          fill: true,
          tension: 0.3
        }]
      },
      options: { 
        responsive: true, 
        maintainAspectRatio: false,
        scales: { y: { min: 0, max: 10 } }
      }
    });
  }

  function renderBarChart(data) {
    const ctx = document.getElementById('chartBar').getContext('2d');
    if (chartInstance2) chartInstance2.destroy();

    // Compter les entrées par staff
    const counts = {};
    data.forEach(d => counts[d.staff] = (counts[d.staff] || 0) + 1);

    chartInstance2 = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: Object.keys(counts),
        datasets: [{
          label: 'Nombre de tests effectués',
          data: Object.values(counts),
          backgroundColor: '#185fa5'
        }]
      },
      options: { 
        responsive: true, 
        maintainAspectRatio: false 
      }
    });
  }
</script>

</body>
</html>
