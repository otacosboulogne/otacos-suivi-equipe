<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Production - O'Tacos</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Ajout de SlimSelect pour une liste déroulante multi-sélection élégante -->
  <link href="https://unpkg.com/slim-select@latest/dist/slimselect.css" rel="stylesheet">
  <script src="https://unpkg.com/slim-select@latest/dist/slimselect.min.js"></script>
  
  <style>
    :root {
      --orange: #f08a00; --blue: #185fa5; --bg: #fdfaf7; --card: #ffffff; --line: #e2d8ce;
    }
    body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: #1a1c1e; margin: 0; padding: 20px; }
    .container { max-width: 1300px; margin: 0 auto; }
    
    /* Header & Logo */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; gap: 20px; }
    .logo-area { display: flex; align-items: center; gap: 15px; }
    .logo-area img { width: 60px; height: 60px; border-radius: 12px; border: 1px solid var(--line); background: #fff; padding: 5px; }
    
    /* Filtres */
    .filter-card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid var(--line); margin-bottom: 25px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
    
    /* Charts */
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
    .chart-box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--line); box-shadow: 0 10px 30px rgba(0,0,0,0.03); min-height: 400px; }
    .full-width { grid-column: span 2; }
    h2 { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--blue); }

    /* Bouton */
    .btn-nav { padding: 12px 20px; border-radius: 12px; border: 1px solid var(--line); background: #fff; text-decoration: none; color: #444; font-weight: 600; transition: 0.2s; }
    .btn-nav:hover { background: var(--orange); color: #fff; border-color: var(--orange); }

    @media (max-width: 900px) { .main-grid { grid-template-columns: 1fr; } .full-width { grid-column: span 1; } .filter-card { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-area">
      <img src="./otacos-logo.png" alt="Logo">
      <div>
        <h1 style="margin:0; font-size: 24px;">Analytics Production</h1>
        <p style="margin:0; color: #666;">Suivi de performance technique</p>
      </div>
    </div>
    <a href="index.html" class="btn-nav">← Formulaire</a>
  </div>

  <div class="filter-card">
    <div>
      <label style="display:block; margin-bottom:8px; font-weight:700;">Comparer des équipiers :</label>
      <select id="staffSelect" multiple></select>
    </div>
    <div>
      <label style="display:block; margin-bottom:8px; font-weight:700;">Période :</label>
      <select id="monthSelect">
        <option value="all">Tout l'historique</option>
      </select>
    </div>
  </div>

  <div class="main-grid">
    <!-- Graphique Global -->
    <div class="chart-box full-width">
      <h2>⭐ Évolution du Score Global (/10)</h2>
      <canvas id="chartScore"></canvas>
    </div>

    <!-- Graphiques par Items -->
    <div class="chart-box">
      <h2>⚖️ Précision du Poids (Cible 300g)</h2>
      <canvas id="chartPoids"></canvas>
    </div>

    <div class="chart-box">
      <h2>⏱️ Rapidité (Secondes)</h2>
      <canvas id="chartTemps"></canvas>
    </div>

    <div class="chart-box full-width">
      <h2>📊 Conformité par Critère (%)</h2>
      <canvas id="chartRadar"></canvas>
    </div>
  </div>
</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxOeeL3oBcLkhZQEUvIwVMBrL62Y9N5zvNkjb_eoyGRabEX3Ht4I3VjrGGlmpDGErTN/exec"; // Remplace par ton URL v4
  let rawData = [];
  let staffSelector, scoreChart, poidsChart, tempsChart, radarChart;

  async function init() {
    try {
      const res = await fetch(`${APPS_SCRIPT_URL}?mode=getProduction`);[cite: 4]
      const json = await res.json();
      if (!json.ok) return;
      rawData = json.data;

      // Init multi-sélecteur
      const staffs = [...new Set(rawData.map(d => d.staff))];
      staffSelector = new SlimSelect({
        select: '#staffSelect',
        data: staffs.map(s => ({ text: s, value: s })),
        onChange: () => updateDashboard()
      });

      updateDashboard();
    } catch (e) { console.error("Erreur d'initialisation", e); }
  }

  function updateDashboard() {
    const selectedStaffs = staffSelector.getSelected();
    let filtered = rawData;
    
    if (selectedStaffs.length > 0) {
      filtered = rawData.filter(d => selectedStaffs.includes(d.staff));
    }

    // Tri par date pour les graphiques
    filtered.sort((a, b) => new Date(a.testDate) - new Date(b.testDate));

    renderScoreChart(filtered, selectedStaffs);
    renderPoidsChart(filtered, selectedStaffs);
    renderTempsChart(filtered, selectedStaffs);
    renderRadarChart(filtered);
  }

  // --- CONFIGURATION DES GRAPHIQUES (HAUTE QUALITÉ) ---

  function renderScoreChart(data, selected) {
    const ctx = document.getElementById('chartScore');
    if (scoreChart) scoreChart.destroy();

    const datasets = selected.length === 0 ? [{
      label: 'Moyenne Globale',
      data: data.map(d => d.note),
      borderColor: '#f08a00',
      backgroundColor: 'rgba(240, 138, 0, 0.1)',
      fill: true,
      tension: 0.4
    }] : selected.map(name => ({
      label: name,
      data: data.filter(d => d.staff === name).map(d => d.note),
      borderColor: '#' + Math.floor(Math.random()*16777215).toString(16), // Couleur aléatoire par équipier
      tension: 0.4
    }));

    scoreChart = new Chart(ctx, {
      type: 'line',
      data: { labels: data.map(d => new Date(d.testDate).toLocaleDateString()), datasets },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
    });
  }

  function renderPoidsChart(data, selected) {
    const ctx = document.getElementById('chartPoids');
    if (poidsChart) poidsChart.destroy();

    poidsChart = new Chart(ctx, {
      type: 'scatter',
      data: {
        datasets: [{
          label: 'Tests (Cible 300g)',
          data: data.map(d => ({ x: new Date(d.testDate), y: d.poids })),
          backgroundColor: '#185fa5'
        }]
      },
      options: {
        scales: { 
          y: { min: 250, max: 350, title: { display: true, text: 'Grammes' } },
          x: { type: 'category', labels: data.map(d => new Date(d.testDate).toLocaleDateString()) }
        }
      }
    });
  }

  function renderTempsChart(data, selected) {
    const ctx = document.getElementById('chartTemps');
    if (tempsChart) tempsChart.destroy();

    tempsChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: data.map(d => new Date(d.testDate).toLocaleDateString()),
        datasets: [{
          label: 'Temps de préparation (s)',
          data: data.map(d => d.tempsSec),
          backgroundColor: data.map(d => d.tempsSec > 60 ? '#b42318' : '#067647')
        }]
      }
    });
  }

  function renderRadarChart(data) {
    const ctx = document.getElementById('chartRadar');
    if (radarChart) radarChart.destroy();

    // Calcul des moyennes par critère décodé du JSON 'details'
    const criteria = { croisillons: 0, emballage: 0, sauces: 0, poids_ok: 0 };
    data.forEach(d => {
      const det = typeof d.details === 'string' ? JSON.parse(d.details) : d.details;[cite: 4]
      if (det.croisillons?.includes('1/1')) criteria.croisillons++;
      if (det.emballage?.includes('1/1')) criteria.emballage++;
      if (det.sauces?.includes('1/1')) criteria.sauces++;
      if (det.poids?.includes('2/2')) criteria.poids_ok++;
    });

    const count = data.length || 1;
    radarChart = new Chart(ctx, {
      type: 'radar',
      data: {
        labels: ['Croisillons', 'Emballage', 'Sauces', 'Poids Conforme'],
        datasets: [{
          label: '% de réussite',
          data: [
            (criteria.croisillons/count)*100,
            (criteria.emballage/count)*100,
            (criteria.sauces/count)*100,
            (criteria.poids_ok/count)*100
          ],
          backgroundColor: 'rgba(24, 95, 165, 0.2)',
          borderColor: '#185fa5',
          pointBackgroundColor: '#185fa5'
        }]
      },
      options: { scales: { r: { min: 0, max: 100 } } }
    });
  }

  init();
</script>
</body>
</html>
