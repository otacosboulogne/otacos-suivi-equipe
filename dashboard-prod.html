<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analytics Production - O'Tacos</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- SlimSelect pour une liste multi-sélection élégante -->
  <link href="https://unpkg.com/slim-select@latest/dist/slimselect.css" rel="stylesheet">
  <script src="https://unpkg.com/slim-select@latest/dist/slimselect.min.js"></script>
  
  <style>
    :root { --orange: #f08a00; --blue: #185fa5; --bg: #fdfaf7; --card: #ffffff; --line: #e2d8ce; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: #1a1c1e; margin: 0; padding: 20px; }
    .container { max-width: 1300px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
    .logo-area { display: flex; align-items: center; gap: 15px; }
    .logo-area img { width: 60px; height: 60px; border-radius: 12px; border: 1px solid var(--line); background: #fff; padding: 5px; }
    .filter-card { background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid var(--line); margin-bottom: 25px; display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
    .chart-box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid var(--line); box-shadow: 0 10px 30px rgba(0,0,0,0.03); min-height: 400px; }
    .full-width { grid-column: span 2; }
    h2 { font-size: 18px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--blue); }
    .btn-nav { padding: 12px 20px; border-radius: 12px; border: 1px solid var(--line); background: #fff; text-decoration: none; color: #444; font-weight: 600; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-area">
      <img src="./otacos-logo.png" alt="Logo">
      <div>
        <h1 style="margin:0; font-size: 24px;">Analytics Production</h1>
        <p style="margin:0; color: #666;">Suivi de performance technique</p>
      </div>
    </div>
    <a href="index.html" class="btn-nav">← Formulaire</a>
  </div>

  <div class="filter-card">
    <div>
      <label style="display:block; margin-bottom:8px; font-weight:700;">Comparer des équipiers :</label>
      <select id="staffSelect" multiple></select>
    </div>
    <div>
      <label style="display:block; margin-bottom:8px; font-weight:700;">Période :</label>
      <select id="monthSelect">
        <option value="all">Tout l'historique</option>
      </select>
    </div>
  </div>

  <div class="main-grid">
    <div class="chart-box full-width">
      <h2>⭐ Évolution du Score Global (/10)</h2>
      <canvas id="chartScore"></canvas>
    </div>
    <div class="chart-box">
      <h2>⚖️ Précision du Poids (Cible 300g)</h2>
      <canvas id="chartPoids"></canvas>
    </div>
    <div class="chart-box">
      <h2>⏱️ Rapidité (Secondes)</h2>
      <canvas id="chartTemps"></canvas>
    </div>
  </div>
</div>

<script>
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxOeeL3oBcLkhZQEUvIwVMBrL62Y9N5zvNkjb_eoyGRabEX3Ht4I3VjrGGlmpDGErTN/exec";
  let rawData = [];
  let staffSelector, scoreChart, poidsChart, tempsChart;

  async function init() {
    try {
      // APPEL DU SCRIPT
      const res = await fetch(`${APPS_SCRIPT_URL}?mode=getProduction`);
      const json = await res.json();
      
      // CORRECTION : Ton JSON utilise "production", pas "data"
      if (!json.ok || !json.production) {
        console.error("Données invalides", json);
        return;
      }
      
      rawData = json.production;

      // Initialisation du sélecteur avec les noms reçus (Usman, Fanny...)
      const staffs = [...new Set(rawData.map(d => d.staff))];
      staffSelector = new SlimSelect({
        select: '#staffSelect',
        data: staffs.map(s => ({ text: s, value: s })),
        events: { afterChange: () => updateDashboard() }
      });

      updateDashboard();
    } catch (e) { console.error("Erreur d'initialisation", e); }
  }

  function updateDashboard() {
    const selectedStaffs = staffSelector.getSelected();
    let filtered = (selectedStaffs.length > 0) 
      ? rawData.filter(d => selectedStaffs.includes(d.staff)) 
      : rawData;

    // Tri par date
    filtered.sort((a, b) => new Date(a.date) - new Date(b.date));

    renderScoreChart(filtered, selectedStaffs);
    renderPoidsChart(filtered);
    renderTempsChart(filtered);
  }

  function renderScoreChart(data, selected) {
    const ctx = document.getElementById('chartScore').getContext('2d');
    if (scoreChart) scoreChart.destroy();

    const datasets = selected.length === 0 ? [{
      label: 'Moyenne Globale',
      data: data.map(d => d.note),
      borderColor: '#f08a00',
      backgroundColor: 'rgba(240, 138, 0, 0.1)',
      fill: true, tension: 0.4
    }] : selected.map(name => ({
      label: name,
      data: data.filter(d => d.staff === name).map(d => d.note),
      borderColor: '#' + Math.floor(Math.random()*16777215).toString(16),
      tension: 0.4
    }));

    scoreChart = new Chart(ctx, {
      type: 'line',
      data: { labels: data.map(d => d.date), datasets },
      options: { responsive: true, maintainAspectRatio: false }
    });
  }

  function renderPoidsChart(data) {
    const ctx = document.getElementById('chartPoids').getContext('2d');
    if (poidsChart) poidsChart.destroy();
    poidsChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: data.map(d => d.staff),
        datasets: [{ label: 'Note Performance', data: data.map(d => d.note), backgroundColor: '#185fa5' }]
      }
    });
  }

  function renderTempsChart(data) {
    const ctx = document.getElementById('chartTemps').getContext('2d');
    if (tempsChart) tempsChart.destroy();
    tempsChart = new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: [...new Set(data.map(d => d.staff))],
        datasets: [{
          data: [...new Set(data.map(d => d.staff))].map(s => data.filter(x => x.staff === s).length),
          backgroundColor: ['#f08a00', '#185fa5', '#e2d8ce']
        }]
      }
    });
  }

  init();
</script>
</body>
</html>
